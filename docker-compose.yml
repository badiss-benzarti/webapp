services:
  mysql-db:
    image: mysql:8.0.36
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: productdb
    ports:
      - "13307:3306"
    volumes:
      - mysql-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 180s

  mongo-order:
    image: mongo:7
    container_name: mongo-order
    restart: always
    ports:
      - "27018:27017"
    volumes:
      - mongo-order-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: keycloak
    restart: always
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./keycloak/import:/opt/keycloak/data/import

  discovery-server:
    build:
      context: ./discovery-server/discovery-server
    container_name: discovery-server
    restart: on-failure
    ports:
      - "8761:8761"
    environment:
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always

  config-server:
    build:
      context: ./config-server/config-server
    container_name: config-server
    restart: on-failure
    ports:
      - "8888:8888"
    environment:
      SERVER_PORT: 8888
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: classpath:/configurations
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    depends_on:
      - discovery-server

  product-service:
    build:
      context: ./product-service/product-service
    container_name: product-service
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/productdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: admin
      SPRING_RABBITMQ_PASSWORD: admin
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    depends_on:
      mysql-db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      discovery-server:
        condition: service_started
      config-server:
        condition: service_started

  order-service:
    build:
      context: ./order-service
    container_name: order-service
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      PORT: 8082
      MONGO_URI: mongodb://mongo-order:27017/orderdb
      EUREKA_HOST: discovery-server
      EUREKA_PORT: 8761
      SERVICE_HOSTNAME: order-service
      RABBITMQ_URL: amqp://admin:admin@rabbitmq:5672
      PRODUCT_SERVICE_URL: http://product-service:8081
    depends_on:
      - mongo-order
      - rabbitmq
      - discovery-server
      - product-service

  api-gateway:
    build:
      context: ./api-gateway/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "8088:8088"
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/distributed-app/protocol/openid-connect/certs
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
    depends_on:
      - discovery-server
      - config-server
      - product-service
      - order-service
      - keycloak

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    restart: on-failure
    ports:
      - "4200:80"
    depends_on:
      - api-gateway

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: prometheus
    restart: always
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - api-gateway
      - product-service
      - config-server
      - discovery-server

  grafana:
    image: grafana/grafana:10.4.3
    container_name: grafana
    restart: always
    ports:
      - "127.0.0.1:19090:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-db-data:
  mongo-order-data:
  keycloak-data:
  grafana-data: